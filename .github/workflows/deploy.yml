name: 🚀 Deploy Frontend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -t itdaily-frontend:latest .

      - name: Export Docker Image
        run: |
          docker save itdaily-frontend:latest \
            -o image.tar

          ls -lh image.tar

      - name: Compress Docker Image
        run: |
          gzip image.tar

          chmod 644 image.tar.gz

          ls -lah image.tar.gz

      - name: Check Image Permission
        run: |
          ls -lah
          stat image.tar.gz
          whoami

      - name: Upload Image To VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'image.tar.gz'
          target: '/home/${{ secrets.VPS_USER }}/'

      - name: Deploy On VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |

            echo "Current user:"
            whoami


            echo "Checking uploaded file:"
            ls -lh /home/${{ secrets.VPS_USER }}/image.tar.gz


            echo "Extracting image:"
            cd /home/${{ secrets.VPS_USER }}

            gunzip -f image.tar.gz


            echo "Loading Docker image:"
            docker load -i image.tar


            echo "Restarting container:"
            cd ${{ secrets.VPS_PATH }}

            docker compose up -d --force-recreate


            echo "Cleaning up:"
            rm -f /home/${{ secrets.VPS_USER }}/image.tar


            docker image prune -f


            echo "🚀 Deployment completed successfully"
